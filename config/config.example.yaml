# HalluRef 配置文件

llm:
  # OpenAI API 兼容接口配置
  base_url: "https://api.deepseek.com"
  api_key: "YOUR_DEEPSEEK_API_KEY"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 8192

retriever:
  openalex:
    base_url: "https://api.openalex.org/works"
    # 填入邮箱进入 polite pool, 可获得 10 req/s (无需注册)
    mailto: "your@email.com"
    timeout: 15

  crossref:
    base_url: "https://api.crossref.org/works"
    # 填入邮箱进入 polite pool, 速率限制更宽松 (无需注册)
    mailto: "your@email.com"
    timeout: 15

  serper:
    # Serper.dev — Google Web Search, 注册即送 2500 次免费查询
    # 端点: https://google.serper.dev/search
    api_key: "YOUR_SERPER_API_KEY"
    timeout: 15
    max_results: 5

  serpapi:
    # SerpAPI.com — Google Web Search 备选, 100 次/月免费
    # 端点: https://serpapi.com/search.json (engine=google)
    # Tier 2 中 Serper 优先, 仅当 Serper 未配置时启用 SerpAPI
    api_key: ""
    timeout: 20
    max_results: 5

  google_scholar:
    # 启用 Google Scholar 补查 (主力检索未找到时自动触发)
    enabled: true
    # HTTP/SOCKS5 代理地址, 避免 Google 封禁 IP
    # 示例: "http://127.0.0.1:7890" / "socks5://127.0.0.1:1080"
    proxy: "http://127.0.0.1:7890"
    timeout: 20
    max_results: 3

similarity:
  # 标题模糊匹配阈值
  title_exact_threshold: 0.95
  title_fuzzy_threshold: 0.85
  # 作者名匹配阈值
  author_match_threshold: 0.80

detection:
  # 元数据不一致判定阈值：不一致字段数 >= 此值 → METADATA_ERROR
  metadata_mismatch_threshold: 2
  # 单次检测的最大输入文本字符数，超过则拒绝处理
  max_input_chars: 20000
