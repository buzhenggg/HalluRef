# HalluRef 配置文件

llm:
  # OpenAI API 兼容接口配置
  base_url: "https://api.deepseek.com"
  api_key: "YOUR_DEEPSEEK_API_KEY"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 8192

retriever:
  proxy:
    # 统一代理配置，同时作用于 Google Scholar 直接爬虫与落地页抓取
    # 例如: "http://127.0.0.1:7890" / "socks5://127.0.0.1:7891"
    server: ""

  openalex:
    base_url: "https://api.openalex.org/works"
    # 填入邮箱进入 polite pool, 可获得 10 req/s (无需注册)
    mailto: "your@email.com"
    timeout: 15

  crossref:
    base_url: "https://api.crossref.org/works"
    # 填入邮箱进入 polite pool, 速率限制更宽松 (无需注册)
    mailto: "your@email.com"
    timeout: 15

  arxiv:
    timeout: 15
    max_results: 5

  semantic_scholar:
    # Semantic Scholar Graph API. Required to enable this Tier 1 academic retriever.
    api_key: ""
    timeout: 15

  serper:
    # Serper.dev – 用于 Google Scholar Search API
    # Scholar 端点: https://google.serper.dev/scholar
    api_key: "YOUR_SERPER_API_KEY"
    timeout: 15
    max_results: 5

  serpapi:
    # SerpAPI.com – Scholar 搜索 API 备选, 100 次/月免费
    # 端点: https://serpapi.com/search.json (engine=google_scholar)
    # Scholar 层遵循 Serper 优先, 仅当 Serper 未配置时启用 SerpAPI
    api_key: ""
    timeout: 20
    max_results: 5

  google_scholar:
    # Google Scholar direct HTTP crawler final fallback
    timeout: 15
    max_results: 3

similarity:
  # 标题模糊匹配阈值
  title_exact_threshold: 0.95
  title_fuzzy_threshold: 0.85
  # 作者名匹配阈值
  author_match_threshold: 0.80

detection:
  # 元数据不一致判定阈值：不一致字段数 >= 此值 → METADATA_ERROR
  metadata_mismatch_threshold: 2
  # 单次检测的最大输入文本字符数，超过则拒绝处理
  max_input_chars: 100000
  # 上传 PDF / DOCX 文件的最大字节数，默认 10 MiB
  max_upload_bytes: 10485760
